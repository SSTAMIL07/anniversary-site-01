<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Anniversary ❤️</title>

<style>

/* 3D animated gradient background */

body{
margin:0;
font-family:'Segoe UI',sans-serif;
color:white;
text-align:center;

background: linear-gradient(-45deg,#ff758c,#ff7eb3,#6a11cb,#2575fc);
background-size:400% 400%;
animation: gradientMove 12s ease infinite;
}

/* smooth gradient movement */

@keyframes gradientMove{

0%{ background-position:0% 50%; }

50%{ background-position:100% 50%; }

100%{ background-position:0% 50%; }

}

/* floating particles */

.particle{
position:fixed;
width:8px;
height:8px;
background:white;
border-radius:50%;
opacity:0.7;
animation: floatUp 8s linear infinite;
}

@keyframes floatUp{

0%{
transform:translateY(100vh) scale(0.5);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-10vh) scale(1);
opacity:0;
}

}

/* content */

.container{
position:relative;
z-index:2;
padding:20px;
max-width:900px;
margin:auto;
}

/* title */

.title{
font-size:40px;
margin-top:20px;
}

/* lover name */

.name{

font-size:50px;
font-weight:bold;
margin-top:10px;
line-height:1.2;

animation: glow 2s infinite alternate;

}

/* glowing text */

@keyframes glow{

from{ text-shadow:0 0 10px white;}

to{ text-shadow:0 0 30px pink,0 0 50px white;}

}

/* image gallery */

.gallery{

margin-top:20px;

}

.gallery img{

width:230px;
max-width:90%;
margin:10px;
border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,0.4);

transition:0.4s;

}

/* 3D hover */

.gallery img:hover{

transform: scale(1.05) rotateY(8deg);

}

/* text */

.message{

font-size:20px;
margin-top:20px;
line-height:1.7;

}

.tamil{

font-size:22px;
margin-top:20px;
line-height:1.6;

}

/* countdown */

#countdown{

font-size:28px;
margin-top:20px;
font-weight:bold;

}

/* button */

button{

margin-top:25px;
padding:12px 28px;

border:none;
border-radius:30px;

font-size:18px;

background:white;
color:#ff4d6d;

cursor:pointer;

transition:0.3s;

}

button:hover{

background:#ff4d6d;
color:white;

}

/* heart animation */

.heart{

position:fixed;

font-size:22px;

animation: heartFloat 4s linear forwards;

}

/* floating hearts */

@keyframes heartFloat{

from{

transform:translateY(0);

opacity:1;

}

to{

transform:translateY(-250px);

opacity:0;

}

}

/* mobile responsive */

@media(max-width:600px){

.name{

font-size:32px;

}

.gallery img{

width:150px;

}

}

</style>

</head>

<body>

<div class="container">

<h1 class="title">💍 Happy Anniversary 💍</h1>

<div class="name">

My Love ❤️ <br>
Charu Kutty 💕

</div>

<div class="gallery">

<img src="Snapchat-609425802.jpg">

<img src="Snapchat-984111794.jpg">

</div>

<div class="message">

Every moment with you is special 💕<br>

You are my happiness, my peace, my forever ❤️

</div>

<div class="tamil">

நீ என் வாழ்க்கையில் வந்த நாள் முதல்<br>

என் உலகமே அழகானது ❤️<br><br>

இனிய ஆண்டு நாள் வாழ்த்துகள் என் காதலி 💍

</div>

<div id="countdown"></div>

<button onclick="createHearts()">Click My Heart 💖</button>

</div>

<!-- music -->

<audio autoplay loop>

<source src="music.mp3" type="audio/mpeg">

</audio>

<script>

/* particles background */

for(let i=0;i<40;i++){

let p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"%";

p.style.animationDelay=Math.random()*8+"s";

document.body.appendChild(p);

}

/* countdown */

var targetDate = new Date("April 28, 2026 00:00:00").getTime();

setInterval(function(){

var now=new Date().getTime();

var distance=targetDate-now;

var d=Math.floor(distance/(1000*60*60*24));

var h=Math.floor((distance%(1000*60*60*24))/(1000*60*60));

var m=Math.floor((distance%(1000*60*60))/(1000*60));

var s=Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML=

d+" Days "+h+" Hours "+m+" Minutes "+s+" Seconds ❤️";

},1000);

/* hearts animation */

function createHearts(){

for(let i=0;i<25;i++){

let heart=document.createElement("div");

heart.innerHTML="❤";

heart.className="heart";

heart.style.left=Math.random()*100+"%";

heart.style.top="80%";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},4000);

}

}

</script>

</body>

</html>
